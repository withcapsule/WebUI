<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>404 — Not Found | Capsule</title>
		<meta name="robots" content="noindex" />

		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />

		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="faq-wrap">
			<a class="faq-back" href="/">← back to Capsule</a>

			<p class="faq-brand">Capsule</p>
			<h1 class="faq-title">404</h1>
			<p class="faq-intro">
				That page doesn't exist. If you followed a file download link, the file
				may have already expired — Capsule files auto-delete after 60 minutes.
			</p>

			<a class="site-link" href="/">Send or receive a file →</a>
		</div>

		<script>
			const stored = localStorage.getItem("theme");
			if (stored === "dark") {
				document.documentElement.setAttribute("data-theme", "dark");
			} else if (stored === "light") {
				document.documentElement.setAttribute("data-theme", "light");
			}
		</script>
	</body>
</html>
